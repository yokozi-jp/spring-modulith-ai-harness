# ローカル開発用 Docker Compose
# docker compose up --build で全サービス起動

services:
  backend:
    container_name: smah-backend
    build:
      context: ./backend
      target: dev
    mem_limit: 4g
    user: root
    ports:
      - "18080:18080"
      - "5005:5005"
    env_file: .env
    environment:
      GRADLE_USER_HOME: /gradle
    volumes:
      - ./backend:/app
      - ./.git:/app/.git:ro
      - ./docker:/docker:ro
      - gradle-cache:/gradle
    command: ["./gradlew", "bootRun", "--project-cache-dir=/gradle/project-cache"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  postgres:
    container_name: smah-postgres
    image: postgres:18.3
    mem_limit: 1g
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      TZ: ${TZ}
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    container_name: smah-keycloak
    image: quay.io/keycloak/keycloak:26.6.0
    mem_limit: 1g
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:8080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
      KC_SPI_IMPORT_IMPORTER: singleFile
      KC_SPI_IMPORT_SINGLE_FILE_STRATEGY: OVERWRITE_EXISTING
    volumes:
      - ./docker/keycloak/demo-realm.json:/opt/keycloak/data/import/demo-realm.json:ro
    command: start-dev --import-realm --health-enabled=true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    container_name: smah-redis
    image: redis:8.6.2
    mem_limit: 256m
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  grafana-lgtm:
    container_name: smah-grafana-lgtm
    image: grafana/otel-lgtm:0.26.0
    mem_limit: 2g
    ports:
      - "3000:3000" # Grafana UI
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

volumes:
  postgres-data:
  gradle-cache:
