# ローカル開発用設定（default プロファイル）
# 明示的に spring.profiles.active を指定しない場合に適用される。

spring:
  # Testcontainers で自動起動される PostgreSQL に接続。
  # spring-boot-testcontainers + ServiceConnection により
  # datasource URL は自動設定されるため、ここでは指定不要。

  # OAuth2: ローカルでは Keycloak コンテナ等を想定。
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/demo

logging:
  level:
    "[com.example.demo]": debug
    "[org.jooq]": debug
