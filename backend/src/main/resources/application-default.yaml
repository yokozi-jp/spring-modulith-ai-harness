# ローカル開発用設定（default プロファイル）
# 明示的に spring.profiles.active を指定しない場合に適用される。
# Docker Compose で起動した外部依存に接続する。
#
# DB 接続情報は spring-boot-docker-compose が PostgreSQL コンテナを検出して自動注入するため不要。
# OAuth2 issuer-uri は自動注入されないためここで固定値を設定する。
# application.yaml の ${OAUTH2_ISSUER_URI} は本番用プレースホルダーとして残し、
# このファイルで上書きすることで bootRun 時に .env や環境変数の設定を不要にしている。

spring:
  docker:
    compose:
      lifecycle-management: start-only
      file: ../compose.yaml
  datasource:
    hikari:
      schema: public
  liquibase:
    default-schema: public
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/demo

# Keycloak がホストの 8080 を使うため、アプリは 8081 で起動する。
server:
  port: 8081

logging:
  level:
    "[com.example.demo]": debug
    "[org.jooq]": debug
