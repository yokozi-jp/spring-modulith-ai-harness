spring:
  application:
    name: demo

  # Jackson (3.x): fail-on-unknown-properties で不正リクエストを早期検出。
  # non-null で null フィールドをレスポンスから除外。
  # Jackson 3 では java.time はデフォルトで ISO-8601 文字列にシリアライズされる。
  jackson:
    default-property-inclusion: non-null
    deserialization:
      fail-on-unknown-properties: true

  # Liquibase: デフォルトパス（classpath:/db/changelog/db.changelog-master.xml）と異なるため明示指定。
  # default-schema: HikariCP の schema 設定を参照しないため個別に指定が必要。
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: ${DB_SCHEMA}

  # jOOQ: Testcontainers の自動検出に頼らず本番でも確実に動作させるため明示。
  jooq:
    sql-dialect: postgres

  # DataSource: 環境変数で注入する。ローカル開発では .env で管理。
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      schema: ${DB_SCHEMA}

  # OAuth2 Resource Server: issuer-uri から OIDC Discovery で JWK Set URI を自動解決。
  # ローカル開発では application-default.yaml で固定値に上書きされる。
  # 本番では環境変数 OAUTH2_ISSUER_URI を設定すること（未設定なら起動失敗する）。
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI}

  # Spring Modulith Events: JDBC ベースの Event Publication Registry。
  # completion-mode: update で完了イベントに日時をマーク。
  # republish-outstanding-events-on-restart: false はマルチインスタンスデプロイ時の安全策。
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false
      completion-mode: update
      republish-outstanding-events-on-restart: false

  # Graceful Shutdown: シャットダウン時に処理中リクエストの完了を最大 30 秒待機。
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Servlet Encoding: レスポンスの文字エンコーディングを UTF-8 に強制。
  servlet:
    encoding:
      charset: UTF-8
      force: true

  # Virtual Threads: Java 25 で仮想スレッドを有効化し Tomcat のスループットを向上。
  threads:
    virtual:
      enabled: true

  # DevTools: コンテナ内のバインドマウントではファイル変更イベントが遅延するため、
  # ポーリング間隔を明示する。本番では devtools 自体が無効化される。
  devtools:
    restart:
      poll-interval: ${SPRING_DEVTOOLS_RESTART_POLL_INTERVAL}
      quiet-period: ${SPRING_DEVTOOLS_RESTART_QUIET_PERIOD}

# Server: graceful shutdown を有効化。
server:
  port: ${SERVER_PORT}
  shutdown: graceful

# Actuator: 必要なエンドポイントのみ公開（"*" は避ける）。
# show-details: when-authorized で認証済みユーザーのみ詳細表示。
# probes.enabled: true で Kubernetes liveness/readiness プローブ対応。
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,modulith,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  info:
    env:
      enabled: true
  # OpenTelemetry: OTLP エクスポーターのエンドポイント。
  # プロパティ名がシグナルごとに異なるため、環境変数も個別に設定する。
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT}
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT}

# Logging: correlation パターンで OpenTelemetry の traceId/spanId をログに含め、
# 分散トレーシングとログの紐付けを実現。
logging:
  level:
    root: info
    "[com.example.demo]": ${LOGGING_LEVEL_COM_EXAMPLE_DEMO}
    "[org.springframework.modulith]": info
    "[org.jooq]": ${LOGGING_LEVEL_ORG_JOOQ}
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
