spring:
  application:
    name: demo

  # Redis: Spring Session のセッションストアとして使用。
  # ホスト・ポートは環境変数で注入する。ローカル開発では .env で管理。
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}

  # Spring Session: Redis をセッションストアに使用し、OAuth2 トークンをサーバーサイドで管理。
  session:
    data:
      redis:
        namespace: "demo:session"

  # Jackson (3.x): fail-on-unknown-properties で不正リクエストを早期検出。
  # non-null で null フィールドをレスポンスから除外。
  # Jackson 3 では java.time はデフォルトで ISO-8601 文字列にシリアライズされる。
  jackson:
    default-property-inclusion: non-null
    deserialization:
      fail-on-unknown-properties: true

  # Liquibase: デフォルトパス（classpath:/db/changelog/db.changelog-master.xml）と異なるため明示指定。
  # default-schema: HikariCP の schema 設定を参照しないため個別に指定が必要。
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    default-schema: ${DB_SCHEMA}

  # jOOQ: Testcontainers の自動検出に頼らず本番でも確実に動作させるため明示。
  jooq:
    sql-dialect: postgres

  # DataSource: 環境変数で注入する。ローカル開発では .env で管理。
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      schema: ${DB_SCHEMA}

  # OAuth2 Client (BFF): Authorization Code Flow + PKCE で Keycloak と連携。
  # トークンはサーバーサイドセッションに保持し、ブラウザには JSESSIONID Cookie のみ送信。
  # Confidential Client のため client-secret を環境変数で注入する。
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: demo-app
            client-secret: ${OAUTH2_CLIENT_SECRET}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        # issuer-uri は設定しない。Spring Boot が起動時に OIDC Discovery を実行するが、
        # コンテナ内から localhost にアクセスできず Connection refused になるため。
        # 全エンドポイントを手動設定し、KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true で
        # バックチャネル通信のトークン検証を許可している。
        provider:
          keycloak:
            authorization-uri: ${OAUTH2_AUTHORIZATION_URI}
            token-uri: ${OAUTH2_TOKEN_URI}
            jwk-set-uri: ${OAUTH2_JWK_SET_URI}
            user-info-uri: ${OAUTH2_USERINFO_URI}
            user-name-attribute: sub

  # Spring Modulith Events: JDBC ベースの Event Publication Registry。
  # completion-mode: archive — 完了イベントを event_publication_archive テーブルへ移動し、
  #   主テーブルには未完了イベントのみ残す。監査ログとしてアーカイブを保持しつつ性能を維持する。
  # republish-outstanding-events-on-restart: false — マルチインスタンスデプロイ時に
  #   他インスタンスが処理中のイベントを誤って再送するリスクを防ぐ。
  #   未完了イベントのリカバリは IncompleteEventPublications API の定期実行で行う。
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: false
      completion-mode: archive
      republish-outstanding-events-on-restart: false

  # Graceful Shutdown: シャットダウン時に処理中リクエストの完了を最大 30 秒待機。
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # Servlet Encoding: レスポンスの文字エンコーディングを UTF-8 に強制。
  servlet:
    encoding:
      charset: UTF-8
      force: true

  # Virtual Threads: Java 25 で仮想スレッドを有効化し Tomcat のスループットを向上。
  threads:
    virtual:
      enabled: true

  # DevTools: コンテナ内のバインドマウントではファイル変更イベントが遅延するため、
  # ポーリング間隔を明示する。本番では devtools 自体が無効化される。
  devtools:
    restart:
      poll-interval: ${SPRING_DEVTOOLS_RESTART_POLL_INTERVAL}
      quiet-period: ${SPRING_DEVTOOLS_RESTART_QUIET_PERIOD}

# Server: graceful shutdown を有効化。
server:
  port: ${SERVER_PORT}
  shutdown: graceful
  servlet:
    session:
      cookie:
        secure: ${SESSION_COOKIE_SECURE}

# Actuator / Swagger 用 Basic 認証の資格情報。環境変数で注入する。
actuator:
  username: ${ACTUATOR_USERNAME}
  password: ${ACTUATOR_PASSWORD}

# Actuator: 必要なエンドポイントのみ公開（"*" は避ける）。
# show-details: when-authorized で認証済みユーザーのみ詳細表示。
# probes.enabled: true で Kubernetes liveness/readiness プローブ対応。
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,modulith,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  # トレースサンプリング率: デフォルト 0.1（10%）。環境変数で制御する。
  # 開発では 1.0（100%）を推奨。本番ではパフォーマンス影響を考慮し 0.1 以下に下げること。
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY}
  info:
    env:
      enabled: true
  # OpenTelemetry: OTLP エクスポーターのエンドポイント。
  # プロパティ名がシグナルごとに異なるため、環境変数も個別に設定する。
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT}
    logging:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT}
  otlp:
    metrics:
      export:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT}
        step: ${OTEL_METRICS_EXPORT_STEP:60s}

# Logging: Micrometer Tracing がクラスパスにあれば traceId/spanId は自動でログに含まれる。
# structured.format.console: コンソール出力を JSON（ECS 形式）にする。環境変数で制御。
logging:
  structured:
    format:
      console: ${LOGGING_STRUCTURED_FORMAT_CONSOLE}
  level:
    root: info
    "[com.example.demo]": ${LOGGING_LEVEL_COM_EXAMPLE_DEMO}
    "[org.springframework.modulith]": info
    "[org.jooq]": ${LOGGING_LEVEL_ORG_JOOQ}

# SpringDoc: デフォルト OFF。開発時は環境変数で有効化する。
springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED}
