databaseChangeLog:
  - changeSet:
      id: "008-create-pricings"
      author: "system"
      changes:
        - createTable:
            tableName: pricings
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: level
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: area_code
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: numeric(12,4)
                  constraints:
                    nullable: false
              - column:
                  name: valid_from
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: valid_to
                  type: timestamptz
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: updated_by
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: timestamptz
