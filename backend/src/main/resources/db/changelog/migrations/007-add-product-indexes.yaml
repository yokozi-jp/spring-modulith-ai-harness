databaseChangeLog:
  - changeSet:
      id: "007-add-product-indexes"
      author: "system"
      changes:
        - sql:
            sql: >-
              CREATE UNIQUE INDEX products_sku_key
              ON products (sku)
              WHERE deleted_at IS NULL
        - createIndex:
            indexName: products_category_id_status_idx
            tableName: products
            columns:
              - column:
                  name: category_id
              - column:
                  name: status
      rollback:
        - sql:
            sql: DROP INDEX IF EXISTS products_sku_key
        - dropIndex:
            indexName: products_category_id_status_idx
            tableName: products
