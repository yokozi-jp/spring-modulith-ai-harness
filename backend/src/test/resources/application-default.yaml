# テスト用設定（default プロファイル）
# main/resources/application.yaml をベースとし、テスト固有の値のみ上書きする。
# datasource は Testcontainers の @ServiceConnection が動的に上書きする。
# OAuth2 issuer-uri は TestcontainersConfiguration の Keycloak コンテナが動的に上書きする。
# ここではプレースホルダー解決エラーを防ぐためダミー値を設定する。

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/dummy
    username: dummy
    password: dummy
    hikari:
      schema: public
  liquibase:
    default-schema: public
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost/dummy
  devtools:
    restart:
      poll-interval: 2s
      quiet-period: 1s

server:
  port: 8081

logging:
  level:
    "[com.example.demo]": debug
    "[org.jooq]": debug
management:
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost/dummy
    logging:
      export:
        otlp:
          endpoint: http://localhost/dummy
  otlp:
    metrics:
      export:
        url: http://localhost/dummy
