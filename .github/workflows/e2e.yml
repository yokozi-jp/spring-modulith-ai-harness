name: E2E Tests

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy .env.test.example to .env.test
        run: cp .env.test.example .env.test

      - name: Fix permissions for Docker bind mount
        run: chmod -R 777 backend

      - name: Run E2E tests
        run: make e2e
