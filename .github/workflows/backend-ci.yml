name: Backend CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Copy .env.test.example to .env.test
        run: cp .env.test.example .env.test

      - name: Run check (compile, test, PMD, SpotBugs, JaCoCo)
        run: make test

      - name: Run E2E tests
        run: make e2e

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/build/reports/tests/
            backend/build/reports/pmd/
            backend/build/reports/jacoco/
          retention-days: 7
