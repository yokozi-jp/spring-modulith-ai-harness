# E2Eテスト用 Docker Compose オーバーライド
# 使用方法: docker compose -f compose.yaml -f compose.e2e.yaml up --build --abort-on-container-exit e2e-runner
#
# ベースの compose.yaml からの差分:
# - backend: dev → runtime ステージ、env_file を .env.test に差し替え
# - postgres/keycloak/redis: ポート公開を無効化（外部アクセス不要）
# - grafana-lgtm: 無効化（E2Eでは不要）
# - frontend-e2e, e2e-runner: 追加サービス

services:
  # --- 既存サービスのオーバーライド ---

  postgres:
    container_name: postgres-e2e
    ports: !override []

  keycloak:
    container_name: keycloak-e2e
    ports: !override []

  redis:
    container_name: redis-e2e
    ports: !override []

  backend:
    container_name: backend-e2e
    build:
      context: ./backend
      target: runtime
    mem_limit: 2g
    ports: !override []
    env_file: !override
      - ./e2e/.env.test
    environment: !override {}
    volumes: !override []
    command: !override []
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:18080/actuator/health/readiness || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  grafana-lgtm:
    profiles: ["disabled"]

  # --- E2E追加サービス ---

  frontend-e2e:
    image: nginx:alpine
    mem_limit: 64m
    volumes:
      - ./e2e/frontend-stub:/usr/share/nginx/html:ro
      - ./e2e/frontend-stub/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 5
    depends_on:
      backend:
        condition: service_healthy

  e2e-runner:
    build:
      context: ./e2e
    mem_limit: 2g
    environment:
      FRONTEND_URL: http://frontend-e2e:80
      BACKEND_URL: http://backend:18080
      DATABASE_URL: postgresql://demo:demo@postgres:5432/demo
      KEYCLOAK_TOKEN_URL: http://keycloak:8080/realms/demo/protocol/openid-connect/token
    volumes:
      - ./e2e/test-results:/e2e/test-results
      - ./e2e/playwright-report:/e2e/playwright-report
    depends_on:
      backend:
        condition: service_healthy
      frontend-e2e:
        condition: service_healthy
