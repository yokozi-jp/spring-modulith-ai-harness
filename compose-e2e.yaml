# E2E テスト用 Docker Compose
# 実行: make e2e
# 停止: docker compose -f compose-e2e.yaml down

name: smah-e2e

services:
  backend-e2e:
    container_name: smah-backend-e2e
    build:
      context: ./backend
      target: dev
    mem_limit: 4g
    user: root
    env_file: .env.test
    environment:
      GRADLE_USER_HOME: /gradle
      DATASOURCE_URL: jdbc:postgresql://postgres-e2e:5432/demo
      SPRING_DATA_REDIS_HOST: redis-e2e
      OAUTH2_AUTHORIZATION_URI: http://keycloak-e2e:8080/realms/demo/protocol/openid-connect/auth
      OAUTH2_TOKEN_URI: http://keycloak-e2e:8080/realms/demo/protocol/openid-connect/token
      OAUTH2_JWK_SET_URI: http://keycloak-e2e:8080/realms/demo/protocol/openid-connect/certs
      OAUTH2_USERINFO_URI: http://keycloak-e2e:8080/realms/demo/protocol/openid-connect/userinfo
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://grafana-lgtm-e2e:4318/v1/traces
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://grafana-lgtm-e2e:4318/v1/logs
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: http://grafana-lgtm-e2e:4318/v1/metrics
      OTEL_METRICS_EXPORT_STEP: 10s
    volumes:
      - ./backend:/app
      - ./.git:/app/.git:ro
      - ./docker:/docker:ro
      - gradle-cache-e2e:/gradle
    command: ["sleep", "infinity"]
    depends_on:
      postgres-e2e:
        condition: service_healthy
      redis-e2e:
        condition: service_healthy
      keycloak-e2e:
        condition: service_healthy
      grafana-lgtm-e2e:
        condition: service_healthy

  postgres-e2e:
    container_name: smah-postgres-e2e
    image: postgres:18.3
    mem_limit: 512m
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      TZ: UTC
    volumes:
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 3s
      timeout: 2s
      retries: 10

  redis-e2e:
    container_name: smah-redis-e2e
    image: redis:8.6.2
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  keycloak-e2e:
    container_name: smah-keycloak-e2e
    image: quay.io/keycloak/keycloak:26.6.0
    mem_limit: 1g
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://keycloak-e2e:8080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./docker/keycloak/demo-realm.json:/opt/keycloak/data/import/demo-realm.json:ro
    command: start-dev --import-realm --health-enabled=true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  grafana-lgtm-e2e:
    container_name: smah-grafana-lgtm-e2e
    image: grafana/otel-lgtm:0.26.0
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ready"]
      interval: 5s
      timeout: 2s
      retries: 30
      start_period: 30s

volumes:
  gradle-cache-e2e:
