# テスト用 Docker Compose
# テスト実行:
#   docker compose -f compose-test.yaml run --rm backend-test
# 停止:
#   docker compose -f compose-test.yaml down

services:
  backend-test:
    container_name: smah-backend-test
    build:
      context: ./backend
      target: dev
    mem_limit: 4g
    env_file: .env.test
    environment:
      GRADLE_USER_HOME: /app/.gradle-docker
    volumes:
      - ./backend:/app
      - ./.git:/app/.git:ro
      - ./docker:/docker:ro
      - gradle-cache-test:/app/.gradle-docker
    command: ["./gradlew", "check", "--project-cache-dir=/app/.gradle-docker/project-cache"]
    depends_on:
      postgres-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
      keycloak-test:
        condition: service_healthy

  postgres-test:
    container_name: smah-postgres-test
    image: postgres:18.3
    mem_limit: 512m
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: demo
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      TZ: UTC
    volumes:
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d demo"]
      interval: 3s
      timeout: 2s
      retries: 10

  redis-test:
    container_name: smah-redis-test
    image: redis:8.6.2
    mem_limit: 128m
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  keycloak-test:
    container_name: smah-keycloak-test
    image: quay.io/keycloak/keycloak:26.6.0
    mem_limit: 1g
    ports:
      - "18080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: http://localhost:18080
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - ./docker/keycloak/demo-realm.json:/opt/keycloak/data/import/demo-realm.json:ro
    command: start-dev --import-realm --health-enabled=true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200'",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  grafana-lgtm-test:
    container_name: smah-grafana-lgtm-test
    image: grafana/otel-lgtm:0.26.0
    mem_limit: 1g
    ports:
      - "13000:3000"
      - "14317:4317"
      - "14318:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  gradle-cache-test:
